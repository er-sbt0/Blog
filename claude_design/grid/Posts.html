<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Posts — refined</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #f4f3f0;
      font-family: "Inter", system-ui, sans-serif; color: #1a1a1a; }
    * { box-sizing: border-box; }
    #root { height: 100vh; display: flex; align-items: stretch; justify-content: center; }
    .app-frame {
      width: 100%; max-width: 1100px; height: 100%; background: #fff;
      box-shadow: 0 1px 0 rgba(0,0,0,0.04), 0 24px 60px rgba(20,20,30,0.06);
    }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="common.jsx"></script>
  <script type="text/babel" src="variant-a.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "density": "comfortable",
      "tagStyle": "dot"
    }/*EDITMODE-END*/;

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      return (
        <React.Fragment>
          <div className="app-frame">
            <VariantA density={t.density} tagStyle={t.tagStyle} />
          </div>
          <TweaksPanel title="Tweaks">
            <TweakSection title="Density">
              <TweakRadio value={t.density} onChange={(v) => setTweak("density", v)}
                options={[
                  { value: "comfortable", label: "Comfortable" },
                  { value: "compact", label: "Compact" },
                ]} />
            </TweakSection>
            <TweakSection title="Tag style">
              <TweakRadio value={t.tagStyle} onChange={(v) => setTweak("tagStyle", v)}
                options={[
                  { value: "filled", label: "Filled" },
                  { value: "outline", label: "Outline" },
                  { value: "dot", label: "Dot" },
                ]} />
            </TweakSection>
          </TweaksPanel>
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
